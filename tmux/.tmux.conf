set -g default-terminal "screen-256color"

unbind %
bind + split-window -h

unbind '"'
bind - split-window -v

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y" then Control + c to exit copy mode
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse == Control + c